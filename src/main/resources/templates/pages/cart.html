<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Cart</title>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>My Cart</h1>

<div th:if="${#lists.isEmpty(cart)}">

    <h3>No items in cart</h3>

    <p>
        You didn't add any product yet.
    </p>

</div>

<table border="1"th:unless="${cart.isEmpty()}">

    <thead>

    <tr>

        <th>Product</th>

        <th>Price</th>

        <th>Quantity</th>

        <th>Total</th>

        <th>Action</th>

    </tr>

    </thead>

    <tbody>

    <tr th:each="item : ${cart}">

        <td th:text="${item.productName}">
        </td>

        <td th:text="${item.price}">
        </td>

        <td th:text="${item.quantity}">
        </td>

        <td th:text="${item.totalPrice}">
        </td>

        <td>

            <a th:href=
                       "@{'/cart/remove/' + ${item.productId}}">

                Remove

            </a>

        </td>

    </tr>

    </tbody>

</table>

<br>

<b>Not done yet?</b>

<a th:href="@{/products}">
    Back to products
</a>

<br>

<h3>

    Total:

    <span th:text="${cartTotal}">
    </span>

</h3>

<form th:action="@{/purchases/create}"
      method="post">

    <button type="submit">

        Purchase

    </button>

</form>

</body>

</html>
