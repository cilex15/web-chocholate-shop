<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Create Discount</title>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Create Discount</h1>

<form th:action="@{/discounts/create}"
      th:object="${discount}"
      method="post">

    <div>

        <label>Product:</label>

        <select th:field="*{product.id}">

            <option
                    th:each="product : ${products}"
                    th:value="${product.id}"
                    th:text="${product.name}">
            </option>

        </select>

    </div>

    <br>

    <div>

        <label>Discount Percent:</label>

        <input type="number"
               min="0"
               max="100"
               th:field="*{discountPercent}">

    </div>

    <br>

    <div>

        <label>Start Date:</label>

        <input type="datetime-local"
               th:field="*{startDateTime}">

    </div>

    <br>

    <div>

        <label>End Date:</label>

        <input type="datetime-local"
               th:field="*{endDateTime}">

    </div>

    <br>

    <button type="submit">

        Create Discount

    </button>

</form>

</body>

</html>
