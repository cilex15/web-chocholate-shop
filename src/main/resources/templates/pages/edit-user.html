<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Edit User</h1>

<form th:action="@{/users/edit}"
      th:object="${user}"
      method="post">

    <input type="hidden"
           th:field="*{id}">

    <input type="hidden"
           th:field="*{registrationDateTime}">

    <input type="hidden"
           th:field="*{password}">

    <div>

        <label>Username:</label>

        <input type="text"
               th:field="*{username}">

    </div>

    <br>

    <div>

        <label>Email:</label>

        <input type="email"
               th:field="*{email}">

    </div>

    <br>

    <div>

        <label>First Name:</label>

        <input type="text"
               th:field="*{firstName}">

    </div>

    <br>

    <div>

        <label>Last Name:</label>

        <input type="text"
               th:field="*{lastName}">

    </div>

    <br>

    <div>

        <label>Birth Date:</label>

        <input type="date"
               th:field="*{birthDate}">

    </div>

    <br>

    <div>

        <label>Role:</label>

        <select th:field="*{role}">

            <option th:value="CUSTOMER">
                Customer
            </option>

            <option th:value="ADMIN">
                Administrator
            </option>

        </select>

    </div>

    <br>


    <button type="submit">

        Save Changes

    </button>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
