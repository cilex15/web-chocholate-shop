<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Factory</title>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Edit Factory</h1>

<form th:action="@{/factories/edit}"
      th:object="${factory}"
      method="post">

    <input type="hidden"
           th:field="*{id}">

    <div>

        <label>Name:</label>

        <input type="text"
               th:field="*{name}">

    </div>

    <br>

    <div>

        <label>PIB:</label>

        <input type="text"
               th:field="*{pib}">

    </div>

    <br>

    <button type="submit">
        Save Changes
    </button>

</form>

</body>

</html>
