<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Factory</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Edit Factory</h1>

<form th:action="@{/factories/edit}"
      th:object="${factory}"
      method="post">

    <input type="hidden"
           th:field="*{id}">

    <div>

        <label>Name:</label>

        <input type="text"
               th:field="*{name}">

    </div>

    <br>

    <div>

        <label>PIB:</label>

        <input type="text"
               th:field="*{pib}">

    </div>

    <br>

    <button type="submit">
        Save Changes
    </button>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
