<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Discount</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Edit Discount</h1>

<form th:action="@{/discounts/edit}"
      th:object="${discount}"
      method="post">

    <input type="hidden"
           th:field="*{id}">

    <div>

        <label>Product:</label>

        <select th:field="*{product.id}">

            <option
                    th:each="product : ${products}"
                    th:value="${product.id}"
                    th:text="${product.name}">
            </option>

        </select>

    </div>

    <br>

    <div>

        <label>Discount Percent:</label>

        <input type="number"
               min="0"
               max="100"
               th:field="*{discountPercent}">

    </div>

    <br>

    <div>

        <label>Start Date:</label>

        <input type="datetime-local"
               th:value="${#temporals.format(discount.startDateTime, 'yyyy-MM-dd''T''HH:mm')}"
               name="startDateTime">

    </div>

    <br>

    <div>

        <label>End Date:</label>

        <input type="datetime-local"
               th:value="${#temporals.format(discount.endDateTime, 'yyyy-MM-dd''T''HH:mm')}"
               name="endDateTime">

    </div>

    <br>

    <button type="submit">

        Save Changes

    </button>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
