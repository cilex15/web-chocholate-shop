<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Discounts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Discounts</h1>

<a th:href="@{/discounts/create}">
    Create Discount
</a>

<br><br>

<table border="1">

    <thead>

    <tr>

        <th>ID</th>

        <th>Product</th>

        <th>Percent</th>

        <th>Start</th>

        <th>End</th>

        <th>Actions</th>

    </tr>

    </thead>

    <tbody>

    <tr th:each="discount : ${discounts}">

        <td th:text="${discount.id}"></td>

        <td th:text="${discount.product.name}"></td>

        <td th:text="${discount.discountPercent + '%'}"></td>

        <td th:text="${#temporals.format(discount.startDateTime, 'dd.MM.yyyy; HH:mm')}"></td>

        <td th:text="${#temporals.format(discount.endDateTime, 'dd.MM.yyyy; HH:mm')}"></td>

        <td>

            <a th:href="@{'/discounts/edit/' + ${discount.id}}">
                Edit
            </a>

            |

            <a th:href="@{'/discounts/delete/' + ${discount.id}}">
                Delete
            </a>

        </td>

    </tr>

    </tbody>

</table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
