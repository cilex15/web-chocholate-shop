<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Create Product</title>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Create Product</h1>

<form th:action="@{/products/create}"
      th:object="${product}"
      method="post">

    <div>

        <label>Name:</label>

        <input type="text"
               th:field="*{name}">

    </div>

    <br>

    <div>

        <label>Code:</label>

        <input type="text"
               th:field="*{code}">

    </div>

    <br>

    <div>

        <label>Price:</label>

        <input type="number"
               step="0.01"
               th:field="*{price}">

    </div>

    <br>

    <div>

        <label>Stock Quantity:</label>

        <input type="number"
               th:field="*{stockQuantity}">

    </div>

    <br>

    <div>

        <label>Factory:</label>

        <select th:field="*{factory.id}">

            <option
                    th:each="factory : ${factories}"
                    th:value="${factory.id}"
                    th:text="${factory.name}">
            </option>

        </select>

    </div>

    <br>

    <div>

        <label>Description:</label>

        <textarea
                th:field="*{description}"
                rows="5"
                cols="40">
    </textarea>

    </div>

    <br>

    <button type="submit">

        Create Product

    </button>

</form>

</body>

</html>
