<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Create Factory</title>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Create Factory</h1>

<form th:action="@{/factories/create}"
      th:object="${factory}"
      method="post">

    <div>

        <label>Name:</label>

        <input type="text"
               th:field="*{name}">

    </div>

    <br>

    <div>

        <label>PIB:</label>

        <input type="text"
               th:field="*{pib}">

    </div>

    <br>

    <button type="submit">
        Create Factory
    </button>

</form>

</body>

</html>
