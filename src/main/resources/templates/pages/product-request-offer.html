<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Product Request Offer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page-content">

    <h1>Product Request Offer</h1>

    <section class="request-summary">

        <p>
            Customer:
            <span th:text="${productRequest.customer.username}"></span>
        </p>

        <p>
            Customer note:
            <span th:text="${productRequest.customerNote != null ? productRequest.customerNote : '-'}"></span>
        </p>

        <p th:if="${productRequest.revisionComment != null}">
            Revision comment:
            <span th:text="${productRequest.revisionComment}"></span>
        </p>

    </section>

    <form th:action="@{'/product-requests/admin/' + ${productRequest.id} + '/offer'}"
          th:object="${product}"
          method="post"
          class="form-panel">

        <label>Name:</label>
        <input type="text"
               th:field="*{name}"
               required>

        <label>Code:</label>
        <input type="text"
               th:field="*{code}"
               required>

        <label>Price:</label>
        <input type="number"
               step="0.01"
               min="0"
               th:field="*{price}"
               required>

        <label>Stock Quantity:</label>
        <input type="number"
               min="0"
               th:field="*{stockQuantity}"
               required>

        <label>Factory:</label>
        <select th:field="*{factory.id}"
                required>

            <option
                    th:each="factory : ${factories}"
                    th:value="${factory.id}"
                    th:text="${factory.name}"
                    th:selected="${product.factory != null && factory.id == product.factory.id}">
            </option>

        </select>

        <label>Description:</label>
        <textarea th:field="*{description}"
                  rows="5"></textarea>

        <button type="submit">
            Save Offer
        </button>

    </form>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
