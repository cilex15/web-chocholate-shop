<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Product Requests</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page-content">

    <h1>Product Requests</h1>

    <div th:if="${#lists.isEmpty(productRequests)}">
        <h3>No product requests yet.</h3>
    </div>

    <table th:unless="${#lists.isEmpty(productRequests)}">

        <thead>

        <tr>
            <th>Customer</th>
            <th>Name</th>
            <th>Code</th>
            <th>Factory</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Customer Note</th>
            <th>Revision Comment</th>
            <th>Offer Rejection Comment</th>
            <th>Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="request : ${productRequests}">

            <td th:text="${request.customer.username}"></td>
            <td th:text="${request.name}"></td>
            <td th:text="${request.code}"></td>
            <td th:text="${request.factory.name}"></td>
            <td th:text="${request.price}"></td>
            <td th:text="${request.stockQuantity}"></td>
            <td th:text="${request.status}"></td>
            <td th:text="${request.customerNote != null ? request.customerNote : '-'}"></td>
            <td th:text="${request.revisionComment != null ? request.revisionComment : '-'}"></td>
            <td th:text="${request.offerRejectionComment != null ? request.offerRejectionComment : '-'}"></td>

            <td>

                <a th:href="@{'/product-requests/admin/' + ${request.id} + '/offer'}">
                    Create or Update Product
                </a>

                <form th:action="@{'/product-requests/admin/' + ${request.id} + '/reject'}"
                      method="post"
                      class="inline-comment-form">

                    <textarea name="comment"
                              rows="2"
                              placeholder="Rejection comment"
                              required></textarea>

                    <button type="submit">
                        Reject Request
                    </button>

                </form>

            </td>

        </tr>

        </tbody>

    </table>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
