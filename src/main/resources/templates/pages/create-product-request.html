<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Request Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page-content">

    <h1>Request Product</h1>

    <form th:action="@{/product-requests/create}"
          th:object="${productRequest}"
          method="post"
          class="form-panel">

        <label>Name:</label>
        <input type="text"
               th:field="*{name}"
               required>

        <label>Code:</label>
        <input type="text"
               th:field="*{code}"
               required>

        <label>Price:</label>
        <input type="number"
               step="0.01"
               min="0"
               th:field="*{price}"
               required>

        <label>Stock Quantity:</label>
        <input type="number"
               min="0"
               th:field="*{stockQuantity}"
               required>

        <label>Factory:</label>
        <select th:field="*{factory.id}"
                required>

            <option
                    th:each="factory : ${factories}"
                    th:value="${factory.id}"
                    th:text="${factory.name}">
            </option>

        </select>

        <label>Description:</label>
        <textarea th:field="*{description}"
                  rows="5"></textarea>

        <label>Product Note:</label>
        <textarea th:field="*{customerNote}"
                  rows="4"></textarea>

        <button type="submit">
            Send Request
        </button>

    </form>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
