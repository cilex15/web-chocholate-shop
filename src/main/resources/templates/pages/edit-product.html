<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Edit Product</h1>

<form th:action="@{/products/edit}"
      th:object="${product}"
      method="post">

    <input type="hidden"
           th:field="*{id}">

    <div>

        <label>Name:</label>

        <input type="text"
               th:field="*{name}">

    </div>

    <br>

    <div>

        <label>Code:</label>

        <input type="text"
               th:field="*{code}">

    </div>

    <br>

    <div>

        <label>Price:</label>

        <input type="number"
               step="0.01"
               th:field="*{price}">

    </div>

    <br>

    <div>

        <label>Stock Quantity:</label>

        <input type="number"
               th:field="*{stockQuantity}">

    </div>

    <br>

    <div>

        <label>Image Path:</label>

        <input type="text"
               th:field="*{imagePath}">

    </div>

    <br>

    <div>

        <label>Factory:</label>

        <select th:field="*{factory.id}">

            <option
                    th:each="factory : ${factories}"
                    th:value="${factory.id}"
                    th:text="${factory.name}">
            </option>

        </select>

    </div>

    <br>

    <div>

        <label>Description:</label>

        <textarea
                th:field="*{description}"
                rows="5"
                cols="40">
    </textarea>

    </div>

    <br>

    <button type="submit">

        Save Changes

    </button>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
