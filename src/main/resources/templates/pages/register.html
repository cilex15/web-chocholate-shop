<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register</title>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>User Registration</h1>

<form th:action="@{/users/register}"
      th:object="${user}"
      method="post">

    <div>

        <label>Username:</label>

        <input type="text"
               th:field="*{username}">

    </div>

    <br>

    <div>

        <label>Password:</label>

        <input type="password"
               th:field="*{password}">

    </div>

    <br>

    <div>

        <label>Confirm Password:</label>

        <input type="password"
               name="confirmPassword">

    </div>

    <br>

    <div>

        <label>Email:</label>

        <input type="email"
               th:field="*{email}">

    </div>

    <br>

    <div>

        <label>First Name:</label>

        <input type="text"
               th:field="*{firstName}">

    </div>

    <br>

    <div>

        <label>Last Name:</label>

        <input type="text"
               th:field="*{lastName}">

    </div>

    <br>

    <div>

        <label>Birth Date:</label>

        <input type="date"
               th:field="*{birthDate}">

    </div>

    <br>

    <button type="submit">

        Register

    </button>

</form>

<br>

<a th:href="@{/users/login}">

    Already have an account?

    Login here.

</a>

</body>

</html>
