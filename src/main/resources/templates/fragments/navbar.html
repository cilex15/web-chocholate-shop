<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav th:fragment="navbar"
     class="navbar navbar-expand-lg custom-navbar">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold"
           th:href="@{/products}">

            🍫 Chocolate Shop

        </a>

    <div class="ms-auto d-flex align-items-center gap-3">



        <div th:if="${loggedUser == null}"
             class="d-flex align-items-center gap-4">

            <a th:href="@{/cart}">
                Cart
            </a>



            <a class="logout-btn"
                    th:href="@{/users/login}">
                Login
            </a>

        </div>

        <div th:if="${loggedUser != null && loggedUser.role.name() == 'CUSTOMER'}"
             class="d-flex align-items-center gap-4">

            <a th:href="@{/profile}">
                Profile
            </a>



            <a th:href="@{/cart}">
                Cart
            </a>



            <a class="logout-btn"
               th:href="@{/users/logout}">

                Logout

            </a>

        </div>

        <div th:if="${loggedUser != null && loggedUser.role.name() == 'ADMIN'}"
             class="d-flex align-items-center gap-4">

            <div class="dropdown">

                <a class="nav-link dropdown-toggle"
                   href="#"
                   data-bs-toggle="dropdown">

                    Admin Panel

                </a>

                <ul class="dropdown-menu">

                    <li><a class="dropdown-item" th:href="@{/users}">Users</a></li>
                    <li><a class="dropdown-item" th:href="@{/factories}">Factories</a></li>
                    <li><a class="dropdown-item" th:href="@{/discounts}">Discounts</a></li>
                    <li><a class="dropdown-item" th:href="@{/purchases}">Purchases</a></li>
                    <li><a class="dropdown-item" th:href="@{/product-requests/admin}">Product Requests</a></li>

                </ul>

            </div>

            <a class="nav-link"
               th:href="@{/profile}">
                Profile
            </a>

            <a class="nav-link"
               th:href="@{/cart}">
                Cart
            </a>

            <a class="logout-btn"
               th:href="@{/users/logout}">
                Logout
            </a>

        </div>



    </div>

    </div>

</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
