<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav th:fragment="navbar">

    <a th:href="@{/products}">
        Products
    </a>

    <div>

        <div th:if="${loggedUser == null}">

            <a th:href="@{/cart}">
                Cart
            </a>

            |

            <a th:href="@{/users/login}">
                Login
            </a>

        </div>

        <div th:if="${loggedUser != null && loggedUser.role.name() == 'CUSTOMER'}">

            <a th:href="@{/profile}">
                Profile
            </a>

            |

            <a th:href="@{/cart}">
                Cart
            </a>

            |

            <a th:href="@{/users/logout}">
                Logout
            </a>

        </div>

        <div th:if="${loggedUser != null && loggedUser.role.name() == 'ADMIN'}">

            <li class="nav-item dropdown">

                <a class="nav-link dropdown-toggle"
                   href="#"
                   role="button"
                   data-bs-toggle="dropdown"
                   aria-expanded="false">

                    Admin Panel
                </a>

                <ul class="dropdown-menu">

                    <li>
                        <a class="dropdown-item"
                           th:href="@{/users}">
                            Users
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item"
                           th:href="@{/factories}">
                            Factories
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item"
                           th:href="@{/discounts}">
                            Discounts
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item"
                           th:href="@{/purchases}">
                            Purchases
                        </a>
                    </li>

                </ul>

            </li>

            |

            <a th:href="@{/profile}">
                Profile
            </a>

            |

            <a th:href="@{/cart}">
                Cart
            </a>

            |

            <a th:href="@{/users/logout}">
                Logout
            </a>

        </div>

    </div>


</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
